<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List com Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 p-4 sm:p-6">
  <main class="mx-auto w-full max-w-xl rounded-2xl bg-white p-5 shadow-lg sm:p-7">
    <h1 class="mb-5 text-center text-2xl font-bold text-slate-800">Minha To-Do List</h1>

    <form id="task-form" class="mb-5 flex gap-2" autocomplete="off">
      <label for="task-input" class="sr-only">Nova tarefa</label>
      <input
        id="task-input"
        type="text"
        placeholder="Digite uma tarefa"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-700 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        required
      >
      <button
        type="submit"
        class="rounded-lg bg-blue-600 px-4 py-2 font-semibold text-white transition hover:bg-blue-700"
      >
        Adicionar
      </button>
    </form>

    <ul id="task-list" class="space-y-2"></ul>

    <p id="empty-message" class="text-center text-sm text-slate-500">Nenhuma tarefa ainda.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
